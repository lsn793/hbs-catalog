@if (bug) {
<div class="bug-card">
    <div class="bug-avatar">
        <img src="/assets/images/bug1.jpg" class="bug-img">
        <div class="bug-name">
            <strong>{{bug.name}}</strong>
            <strong>{{bug.genus}}</strong>
            <strong>Семейство {{bug.family}}</strong>
        </div>
    </div>
    <div class="bug-card-description">{{bug.description}}</div>
</div>
}
